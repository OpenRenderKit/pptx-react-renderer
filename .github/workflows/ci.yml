name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: pnpm run verify
      - run: pnpm run pack:check

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:unit

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: npx playwright install --with-deps chromium
      - run: pnpm run test:browser
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  visual-regression:
    runs-on: ubuntu-latest
    env:
      PPTX_VISUAL_ENFORCE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - name: Install visual regression system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils
      - run: npx playwright install --with-deps chromium
      - run: pnpm run test:visual
      - name: Build visual regression HTML report
        if: always()
        run: node scripts/write-visual-report.mjs
      - name: Append visual regression summary
        if: always()
        run: node scripts/write-visual-summary.mjs >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-regression-artifacts
          path: |
            playwright-report
            test-results/visual-regression
      - name: Resolve latest successful main visual baseline
        id: resolve_visual_baseline
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASELINE_RUN_ID="$(gh run list --branch main --workflow ci.yml --json databaseId,conclusion --jq 'map(select(.conclusion == "success")) | .[0].databaseId // ""')"
          echo "run_id=$BASELINE_RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Download main visual baseline artifact
        if: always() && github.event_name == 'pull_request' && steps.resolve_visual_baseline.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf .tmp/visual-baseline
          mkdir -p .tmp/visual-baseline
          gh run download "${{ steps.resolve_visual_baseline.outputs.run_id }}" --name visual-regression-artifacts --dir .tmp/visual-baseline
      - name: Resolve Pages site URL
        id: resolve_pages_site
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SITE_URL="$(gh api repos/${{ github.repository }}/pages --jq '.html_url // ""' 2>/dev/null || true)"
          echo "url=$SITE_URL" >> "$GITHUB_OUTPUT"
      - name: Build PR vs main visual comparison
        if: always() && github.event_name == 'pull_request' && steps.resolve_visual_baseline.outputs.run_id != ''
        env:
          PPTX_VISUAL_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PPTX_VISUAL_PR_NUMBER: ${{ github.event.pull_request.number }}
          PPTX_VISUAL_PAGES_BASE_URL: ${{ steps.resolve_pages_site.outputs.url }}
        run: pnpm run fixtures:compare-visual-baseline
      - name: Upload PR visual comparison artifact
        if: always() && github.event_name == 'pull_request' && steps.resolve_visual_baseline.outputs.run_id != ''
        uses: actions/upload-artifact@v7
        with:
          name: visual-pr-comparison
          path: test-results/visual-pr-comparison
      - name: Checkout gh-pages
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.resolve_pages_site.outputs.url != ''
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: .tmp/pages-site
      - name: Publish PR preview site
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.resolve_pages_site.outputs.url != ''
        run: |
          PREVIEW_DIR=".tmp/pages-site/pr-previews/${{ github.event.pull_request.number }}"
          rm -rf "$PREVIEW_DIR"
          mkdir -p "$PREVIEW_DIR"
          cp -R test-results/visual-regression "$PREVIEW_DIR/visual-regression"
          cp -R test-results/visual-pr-comparison "$PREVIEW_DIR/visual-pr-comparison"
          touch .tmp/pages-site/.nojekyll
          node scripts/write-pages-index.mjs .tmp/pages-site
      - name: Commit PR preview site
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.resolve_pages_site.outputs.url != ''
        run: |
          cd .tmp/pages-site
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git status --short | grep . >/dev/null; then
            git add .
            git commit -m "Update PR #${{ github.event.pull_request.number }} previews"
            git push origin gh-pages
          fi
      - name: Append PR visual diff summary
        if: always() && github.event_name == 'pull_request' && steps.resolve_visual_baseline.outputs.run_id != ''
        run: cat test-results/visual-pr-comparison/comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post PR visual diff comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.resolve_visual_baseline.outputs.run_id != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export PR_VISUAL_COMMENT_BODY="$(cat test-results/visual-pr-comparison/comment.md)"
          pnpm run fixtures:post-pr-visual-comment
