name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: pnpm run verify
      - run: pnpm run pack:check

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:unit

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - run: npx playwright install --with-deps chromium
      - run: pnpm run test:browser
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  visual-regression:
    runs-on: ubuntu-latest
    env:
      PPTX_VISUAL_ENFORCE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fixtures:generate
      - name: Install visual regression system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils
      - run: npx playwright install --with-deps chromium
      - run: pnpm run test:visual
      - name: Build visual regression HTML report
        if: always()
        run: node scripts/write-visual-report.mjs
      - name: Append visual regression summary
        if: always()
        run: node scripts/write-visual-summary.mjs >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-regression-artifacts
          path: |
            playwright-report
            test-results/visual-regression
